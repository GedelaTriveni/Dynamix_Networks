<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Resume Analysis Result</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:120px;
background:#f4f6f9;
}

.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.score{
color:green;
font-size:28px;
font-weight:bold;
}

.btn{
background:#2c7be5;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
text-decoration:none;
display:inline-block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Resume Analysis Result</h2>

<p>Your Resume Match Score:</p>

<div class="score">
<span th:text="${#numbers.formatDecimal(score,1,2)}"></span> %
</div>

<br>

<a href="/downloadReport" class="btn">Export Report as PDF</a>

<br><br>

<a href="/">Analyze Another Resume</a>

</div>

</body>

</html>
